<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEROVEE - Ultra Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- Extra Bold Animated Rings --- */
        .loader-container { position: absolute; width: 520px; height: 520px; display: flex; align-items: center; justify-content: center; z-index: 1; }
        .circle { position: absolute; border: 6px solid transparent; border-radius: 50%; animation: rotate linear infinite; }
        
        /* ৫টি বোল্ড রিং */
        .circle:nth-child(1) { width: 100%; height: 100%; border-top-color: #45f3ff; animation-duration: 4s; filter: drop-shadow(0 0 15px #45f3ff); }
        .circle:nth-child(2) { width: 88%; height: 88%; border-bottom-color: #ff3c7b; animation-duration: 3s; animation-direction: reverse; filter: drop-shadow(0 0 15px #ff3c7b); }
        .circle:nth-child(3) { width: 76%; height: 76%; border-left-color: #ffee00; animation-duration: 5s; filter: drop-shadow(0 0 15px #ffee00); }
        .circle:nth-child(4) { width: 64%; height: 64%; border-right-color: #00ff44; animation-duration: 2.5s; animation-direction: reverse; filter: drop-shadow(0 0 15px #00ff44); }
        .circle:nth-child(5) { width: 52%; height: 52%; border-top-color: #7d45ff; animation-duration: 6s; filter: drop-shadow(0 0 15px #7d45ff); }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- UI Card --- */
        .card {
            position: relative; width: 92%; max-width: 380px;
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(30px);
            border-radius: 40px; padding: 50px 25px; z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
        }

        /* --- HEROVEE Color Changing Logo --- */
        .logo { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 34px; 
            letter-spacing: 7px; 
            margin-bottom: 35px;
            font-weight: 900;
            /* এনিমেশন লজিক: রিংয়ের কালারগুলোর সাথে মিল রেখে */
            animation: colorShift 8s infinite linear;
        }

        @keyframes colorShift {
            0% { color: #45f3ff; text-shadow: 0 0 20px #45f3ff; }
            25% { color: #ff3c7b; text-shadow: 0 0 20px #ff3c7b; }
            50% { color: #ffee00; text-shadow: 0 0 20px #ffee00; }
            75% { color: #00ff44; text-shadow: 0 0 20px #00ff44; }
            100% { color: #45f3ff; text-shadow: 0 0 20px #45f3ff; }
        }

        /* --- Inputs --- */
        .input-group { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .input-style { 
            width: 100%; padding: 18px 24px; background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50px; 
            color: white; outline: none; font-size: 14px; transition: 0.3s;
        }
        .input-style:focus { border-color: #45f3ff; background: rgba(255,255,255,0.1); }

        /* --- Button --- */
        .btn-action {
            width: 100%; padding: 18px; background: linear-gradient(90deg, #ff3c7b, #ffed00);
            border: none; border-radius: 50px; color: #000; font-weight: 800; 
            cursor: pointer; font-size: 15px; text-transform: uppercase; letter-spacing: 1px;
        }

        .links-container { display: flex; justify-content: space-between; margin-top: 25px; padding: 0 15px; }
        .link { color: rgba(255,255,255,0.5); cursor: pointer; font-size: 12px; text-decoration: none; }
        .link:hover { color: #fff; }

        #toast { position: fixed; bottom: -60px; left: 50%; transform: translateX(-50%); background: #ff3c7b; color: white; padding: 12px 30px; border-radius: 50px; transition: 0.5s; z-index: 100; }
        #toast.active { bottom: 40px; }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="card">
        <h1 class="logo">HEROVEE</h1>

        <div id="loginBox">
            <div class="input-group">
                <input type="email" id="logEmail" class="input-style" placeholder="Gmail Address">
                <input type="password" id="logPass" class="input-style" placeholder="Password">
            </div>
            <button class="btn-action" id="logBtn">SIGN IN</button>
            <div class="links-container">
                <span class="link" onclick="showBox('resetBox')">Forget Password</span>
                <span class="link" onclick="showBox('regBox')">Create Account</span>
            </div>
        </div>

        <div id="regBox" style="display: none;">
            <div class="input-group">
                <input type="text" id="regName" class="input-style" placeholder="Full Name">
                <input type="email" id="regEmail" class="input-style" placeholder="Gmail Address">
                <input type="password" id="regPass" class="input-style" placeholder="Password">
            </div>
            <button class="btn-action" id="regBtn">SIGN UP</button>
            <div class="links-container">
                <span></span>
                <span class="link" onclick="showBox('loginBox')">Back to Login</span>
            </div>
        </div>

        <div id="resetBox" style="display: none;">
            <div class="input-group">
                <input type="email" id="resEmail" class="input-style" placeholder="Your Gmail">
            </div>
            <button class="btn-action">RESET PASSWORD</button>
            <div class="links-container">
                <span></span>
                <span class="link" onclick="showBox('loginBox')">Cancel</span>
            </div>
        </div>
    </div>

    <div id="toast">Message</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEl8t2m_HZ1oNOC49lmpiiM4-XhGzWRfE",
            authDomain: "herovee.firebaseapp.com",
            projectId: "herovee",
            storageBucket: "herovee.firebasestorage.app",
            messagingSenderId: "700112828047",
            appId: "1:700112828047:web:988f0598b5341a29bba2fa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.showBox = (id) => {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('regBox').style.display = 'none';
            document.getElementById('resetBox').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        };

        document.getElementById('logBtn').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value)
            .catch(() => {
                const t = document.getElementById('toast');
                t.innerText = "Auth Failed!"; t.classList.add('active');
                setTimeout(() => t.classList.remove('active'), 3000);
            });
        };

        onAuthStateChanged(auth, (u) => { if (u) window.location.href = "vault.html"; });
    </script>
</body>
</html>
