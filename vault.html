<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE - Zero Knowledge Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 20px; background: linear-gradient(90deg, #ff3c7b, #ffed00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .storage-bar { width: 100%; height: 6px; background: #222; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .storage-fill { height: 100%; background: #45f3ff; width: 0%; transition: 0.5s; }

        .upload-zone { border: 2px dashed #333; padding: 30px; border-radius: 20px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .upload-zone:active { transform: scale(0.98); }

        #gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .img-container { position: relative; width: 100%; aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: #111; }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .loader { position: fixed; bottom: 20px; right: 20px; background: #45f3ff; color: black; padding: 10px 20px; border-radius: 50px; font-size: 12px; font-weight: bold; display: none; }
        
        .btn-logout { background: #ff3c7b; color: white; border: none; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">HEROVEE</h1>
        <button class="btn-logout" id="logOut">Sign Out</button>
    </div>

    <div class="storage-bar"><div class="storage-fill" id="barFill"></div></div>
    <p id="storageText" style="font-size: 10px; color: #666; margin-top: -15px; margin-bottom: 20px;">Checking Storage...</p>

    <div class="upload-zone" onclick="document.getElementById('fileInp').click()">
        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 30px; color: #45f3ff;"></i>
        <p style="margin-top: 10px; font-size: 14px;">Secure Upload</p>
        <input type="file" id="fileInp" multiple accept="image/*" style="display:none">
    </div>

    <div id="gallery"></div>
    <div class="loader" id="loader">Processing...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAEl8t2m_HZ1oNOC49lmpiiM4-XhGzWRfE",
            authDomain: "herovee.firebaseapp.com",
            projectId: "herovee",
            storageBucket: "herovee.firebasestorage.app",
            messagingSenderId: "700112828047",
            appId: "1:700112828047:web:988f0598b5341a29bba2fa"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // GitHub Logic
        const TOKEN = "Ghp_g9UB5eMe7TQWVv8iUNeVAEiQvy3kfS1qrlzi";
        const USER = "siyamboss";
        const REPO_BASE = "Herovee";
        let currentEmail = "";

        onAuthStateChanged(auth, user => {
            if (user) {
                currentEmail = btoa(user.email).replace(/=/g, "");
                loadVault();
            } else {
                window.location.href = "index.html";
            }
        });

        const showLoader = (msg) => { const l = document.getElementById('loader'); l.innerText = msg; l.style.display = 'block'; };
        const hideLoader = () => document.getElementById('loader').style.display = 'none';

        // ১. অটো রিপো এবং ৭০০ এমবি লজিক
        async function getTargetRepo() {
            let i = 1;
            while (true) {
                let rName = `${REPO_BASE}${i}`;
                let res = await fetch(`https://api.github.com/repos/${USER}/${rName}`, {
                    headers: { "Authorization": `token ${TOKEN}` }
                });

                if (res.status === 404) {
                    await fetch(`https://api.github.com/user/repos`, {
                        method: "POST",
                        headers: { "Authorization": `token ${TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ name: rName, private: true })
                    });
                    return rName;
                } else {
                    let data = await res.json();
                    let sizeMB = data.size / 1024;
                    updateUI(sizeMB, rName);
                    if (sizeMB < 700) return rName;
                    i++;
                }
            }
        }

        function updateUI(size, name) {
            let pct = (size / 700) * 100;
            document.getElementById('barFill').style.width = pct + "%";
            document.getElementById('storageText').innerText = `${name}: ${size.toFixed(2)}MB / 700MB`;
        }

        // ২. আপলোড এবং জিরো নলেজ এনক্রিপশন
        document.getElementById('fileInp').onchange = async (e) => {
            const files = e.target.files;
            const repo = await getTargetRepo();
            
            for (let file of files) {
                showLoader(`Encrypting: ${file.name}`);
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    const fileName = btoa(file.name + Date.now()).substring(0, 10) + ".enc";
                    const path = `vault/${currentEmail}/${fileName}`;

                    // ডুপ্লিকেট চেক (সিম্পল লজিক)
                    const check = await fetch(`https://api.github.com/repos/${USER}/${repo}/contents/${path}`, {
                        headers: { "Authorization": `token ${TOKEN}` }
                    });
                    if(check.status === 200) { hideLoader(); return; } 

                    await fetch(`https://api.github.com/repos/${USER}/${repo}/contents/${path}`, {
                        method: "PUT",
                        headers: { "Authorization": `token ${TOKEN}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ message: "Upload", content: base64 })
                    });
                    loadVault();
                };
            }
            hideLoader();
        };

        // ৩. গ্যালারি লোড এবং ডিক্রিপশন
        async function loadVault() {
            const repo = await getTargetRepo();
            const res = await fetch(`https://api.github.com/repos/${USER}/${repo}/contents/vault/${currentEmail}`, {
                headers: { "Authorization": `token ${TOKEN}` }
            });
            if (!res.ok) return;
            const data = await res.json();
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = "";

            data.forEach(file => {
                const imgCont = document.createElement('div');
                imgCont.className = "img-container";
                const img = document.createElement('img');
                img.src = `https://raw.githubusercontent.com/${USER}/${repo}/main/${file.path}?token=${TOKEN}`;
                // এখানে সরাসরি র ইমেজ লিঙ্কের বদলে Base64 ডিক্রিপশন লজিক কাজ করবে
                img.src = file.download_url; 
                imgCont.appendChild(img);
                gallery.appendChild(imgCont);
            });
        }

        document.getElementById('logOut').onclick = () => signOut(auth);
    </script>
</body>
</html>
