<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE - Secure Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0d11; /* আপনার সাইটের ডার্ক থিম */
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin-top: 30px;
            color: #45f3ff;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.5);
        }

        /* আপলোড সেকশন */
        .upload-container {
            margin: 30px auto;
            width: 90%;
            max-width: 400px;
            padding: 20px;
            border: 2px dashed #ff3c7b;
            border-radius: 20px;
            background: rgba(255, 60, 123, 0.05);
            cursor: pointer;
        }

        /* প্রগ্রেস বার */
        #progressContainer {
            display: none;
            width: 90%;
            max-width: 400px;
            background: #222;
            height: 10px;
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
        }
        #progressBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #45f3ff, #ff3c7b);
            transition: 0.3s;
        }

        /* গ্যালারি গ্রিড */
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 30px;
            padding-bottom: 50px;
        }

        .gallery img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #161a21;
        }
    </style>
</head>

<body>

    <h1>🔐 HEROVEE VAULT</h1>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>

    <div class="upload-container" onclick="document.getElementById('upload').click()">
        <i class="fas fa-cloud-upload-alt" style="font-size: 40px; color: #ff3c7b; margin-bottom: 10px;"></i>
        <p style="font-weight: 600;">TAP TO SECURE PHOTO</p>
        <input type="file" id="upload" accept="image/*" multiple hidden>
    </div>

    <div class="gallery" id="gallery"></div>

    <script type="module">
        const TOKEN = "Ghp_g9UB5eMe7TQWVv8iUNeVAEiQvy3kfS1qrlzi";
        const USER = "SIYAMBOSS";
        const REPO = "Herovee1";
        
        let gallery = document.getElementById("gallery");
        let upload = document.getElementById("upload");
        let pContainer = document.getElementById("progressContainer");
        let pBar = document.getElementById("progressBar");

        // ১. পেজ লোড হলে গিটহাব থেকে ছবি আনা
        loadImages();

        upload.addEventListener("change", async function() {
            let files = upload.files;
            if (files.length === 0) return;

            pContainer.style.display = "block";

            for (let i = 0; i < files.length; i++) {
                let file = files[i];
                
                // প্রগ্রেস আপডেট
                let percent = Math.round(((i + 1) / files.length) * 100);
                pBar.style.width = percent + "%";

                let reader = new FileReader();
                reader.readAsDataURL(file);

                await new Promise((resolve) => {
                    reader.onload = async function() {
                        let base64 = reader.result.split(',')[1];
                        let fileName = Date.now() + "_" + file.name.replace(/\s/g, "_");

                        // গিটহাবে আপলোড
                        try {
                            await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/vault/${fileName}`, {
                                method: "PUT",
                                headers: { 
                                    "Authorization": `token ${TOKEN}`,
                                    "Content-Type": "application/json" 
                                },
                                body: JSON.stringify({ 
                                    message: "upload photo", 
                                    content: base64 
                                })
                            });
                        } catch (err) { console.log("Upload failed", err); }
                        
                        resolve();
                    }
                });
            }

            pContainer.style.display = "none";
            pBar.style.width = "0%";
            loadImages(); // গ্যালারি রিফ্রেশ
        });

        function displayImage(src) {
            let img = document.createElement("img");
            img.src = src;
            img.loading = "lazy"; // ফাস্ট লোডিংয়ের জন্য
            gallery.insertBefore(img, gallery.firstChild); // নতুন ছবি আগে দেখাবে
        }

        async function loadImages() {
            try {
                let res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/vault`, {
                    headers: { "Authorization": `token ${TOKEN}` }
                });

                if (res.ok) {
                    let data = await res.json();
                    gallery.innerHTML = ""; // আগের গুলো ক্লিয়ার করা
                    data.forEach(file => {
                        if (file.type === "file") {
                            displayImage(file.download_url);
                        }
                    });
                }
            } catch (err) { console.log("Load failed", err); }
        }
    </script>

</body>
</html>
