<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE - Elite Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0d11; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- প্রোফাইল সেকশন --- */
        .profile-card {
            background: linear-gradient(180deg, rgba(255, 60, 123, 0.1), transparent);
            padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .avatar-ring {
            width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%;
            padding: 4px; background: linear-gradient(45deg, #ff3c7b, #ffed00, #45f3ff);
            box-shadow: 0 0 20px rgba(255, 60, 123, 0.4);
        }
        .avatar-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #0b0d11; }
        .user-info h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; letter-spacing: 2px; color: #fff; }
        .user-info p { font-size: 12px; color: #45f3ff; margin-top: 5px; font-weight: 600; }

        .stats-row { display: flex; justify-content: center; gap: 30px; margin-top: 20px; }
        .stat-item { text-align: center; }
        .stat-item span { display: block; font-size: 18px; font-weight: 800; color: #fff; }
        .stat-item label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; }

        /* --- ট্যাব সিস্টেম --- */
        .tab-bar { display: flex; justify-content: space-around; background: rgba(255,255,255,0.03); margin: 20px 15px; border-radius: 15px; padding: 5px; }
        .tab { padding: 12px 25px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s; color: rgba(255,255,255,0.5); }
        .tab.active { background: rgba(255,255,255,0.1); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* --- গ্যালারি গ্রিড --- */
        #gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 15px 120px; }
        .media-card { 
            position: relative; border-radius: 20px; overflow: hidden; background: #161a21; 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .media-card img { width: 100%; aspect-ratio: 1/1.2; object-fit: cover; }
        .card-info { position: absolute; bottom: 0; width: 100%; padding: 15px 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
        .card-info p { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #ddd; }

        /* --- ফ্লটিং অ্যাকশন বাটন --- */
        .fab {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 70px; background: linear-gradient(45deg, #ff3c7b, #ffed00);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #000; box-shadow: 0 10px 30px rgba(255, 60, 123, 0.5);
            z-index: 1000; border: 5px solid #0b0d11; cursor: pointer;
        }

        /* --- বটম নেভিগেশন --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(11, 13, 17, 0.95);
            backdrop-filter: blur(20px); display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(255,255,255,0.05); padding: 0 20px; z-index: 999;
        }
        .nav-item { color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; }
        .nav-item.active { color: #45f3ff; }

        #loader { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #ff3c7b; padding: 8px 20px; border-radius: 50px; font-size: 12px; font-weight: bold; display: none; z-index: 2000; }
    </style>
</head>
<body>

</body>
</html>
