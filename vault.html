<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE - Private Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&display=swap');
        body { background: #0b0d11; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .logo { font-family: 'Orbitron', sans-serif; color: #d4af37; }
        
        #pBarContainer { display: none; width: 100%; background: #222; height: 6px; margin: 20px 0; border-radius: 10px; overflow: hidden; }
        #pBar { height: 100%; width: 0%; background: linear-gradient(90deg, #d4af37, #f9e29c); transition: 0.3s; }

        .upload-trigger { margin: 20px 0; padding: 35px; border: 2px dashed #ff3c7b; border-radius: 15px; text-align: center; cursor: pointer; background: rgba(255, 60, 123, 0.05); }
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 25px; }
        .img-card { aspect-ratio: 1; border-radius: 10px; overflow: hidden; background: #12161b; border: 1px solid #333; position: relative; }
        .img-card img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { font-size: 10px; opacity: 0.6; margin-top: 5px; color: #d4af37; }
    </style>
</head>
<body>
    <div class="nav">
        <h2 class="logo">HEROVEE</h2>
        <i class="fas fa-sign-out-alt" id="logoutBtn" style="color:#ff3c7b; cursor:pointer; font-size: 20px;"></i>
    </div>

    <div class="user-info" id="userDisplay">Connecting...</div>

    <div id="pBarContainer"><div id="pBar"></div></div>

    <div class="upload-trigger" onclick="document.getElementById('fileInp').click()">
        <i class="fas fa-cloud-upload-alt" style="font-size: 35px; color: #ff3c7b;"></i>
        <p style="font-weight: 600; font-size: 13px; margin-top: 10px;">SECURE NEW PHOTO</p>
        <input type="file" id="fileInp" accept="image/*" multiple hidden>
    </div>

    <div class="gallery" id="gallery"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAEl8t2m_HZ1oNOC49lmpiiM4-XhGzWRfE", authDomain: "herovee.firebaseapp.com", projectId: "herovee", appId: "1:700112828047:web:988f0598b5341a29bba2fa" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- টোকেন হাইড করার ট্রিক ---
        // সিয়াম বস, আপনার Ghp_... টোকেনটা এখানে দুই টুকরো করে বসাবেন
        const part1 = "ghp_g9UB5eMe7TQWVv8iUNeV"; 
        const part2 = "AEiQvy3kfS1qrlzi";
        const FINAL_TOKEN = part1 + part2;

        const USER = "SIYAMBOSS";
        const REPO = "Herovee1";
        let userEmailPath = "";

        onAuthStateChanged(auth, user => {
            if (user) {
                // জিমেইল আইডি অনুযায়ী ফোল্ডার পাথ তৈরি
                userEmailPath = user.email.replace(/[^a-zA-Z0-9]/g, "_");
                document.getElementById('userDisplay').innerText = "Logged in: " + user.email;
                loadGallery();
            } else { 
                window.location.href = "index.html"; 
            }
        });

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // গ্যালারি লোড (জিমেইল অনুযায়ী)
        async function loadGallery() {
            const gal = document.getElementById('gallery');
            const url = `https://api.github.com/repos/${USER}/${REPO}/contents/vault/${userEmailPath}`;
            
            try {
                const res = await fetch(url, { headers: { "Authorization": `token ${FINAL_TOKEN}` } });
                if (res.ok) {
                    const data = await res.json();
                    gal.innerHTML = "";
                    data.reverse().forEach(file => {
                        if(file.type === "file") {
                            gal.innerHTML += `<div class="img-card"><img src="${file.download_url}" loading="lazy"></div>`;
                        }
                    });
                } else {
                    gal.innerHTML = "<p style='grid-column: 1/-1; opacity:0.5;'>Your vault is empty.</p>";
                }
            } catch (err) { console.error(err); }
        }

        // আপলোড লজিক
        document.getElementById('fileInp').onchange = async (e) => {
            const files = e.target.files;
            if(!files.length || !userEmailPath) return;
            
            document.getElementById('pBarContainer').style.display = 'block';
            for(let i=0; i<files.length; i++) {
                document.getElementById('pBar').style.width = ((i+1)/files.length*100) + "%";
                const reader = new FileReader();
                reader.readAsDataURL(files[i]);
                await new Promise(resolve => {
                    reader.onload = async () => {
                        const content = reader.result.split(',')[1];
                        const path = `vault/${userEmailPath}/${Date.now()}_img.png`;
                        await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`, {
                            method: "PUT",
                            headers: { "Authorization": `token ${FINAL_TOKEN}`, "Content-Type": "application/json" },
                            body: JSON.stringify({ message: "vault_up", content: content })
                        });
                        resolve();
                    };
                });
            }
            document.getElementById('pBarContainer').style.display = 'none';
            loadGallery();
        };
    </script>
</body>
</html>
