<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE - Elite Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0d11; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- Header & Logout --- */
        .top-bar { display: flex; justify-content: flex-end; padding: 15px; }
        .btn-logout { background: #ff3c7b; color: #fff; border: none; padding: 8px 15px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .btn-logout:hover { background: #ffed00; color: #000; }

        /* --- প্রোফাইল সেকশন --- */
        .profile-card { background: linear-gradient(180deg, rgba(255, 60, 123, 0.1), transparent); padding: 10px 20px 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .avatar-ring { width: 110px; height: 110px; margin: 0 auto 15px; border-radius: 50%; padding: 4px; background: linear-gradient(45deg, #ff3c7b, #ffed00, #45f3ff); box-shadow: 0 0 20px rgba(255, 60, 123, 0.4); position: relative; cursor: pointer; }
        .avatar-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #0b0d11; }
        
        .user-info h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; letter-spacing: 2px; color: #fff; }
        .edit-icon { margin-left: 8px; font-size: 14px; color: #45f3ff; cursor: pointer; }

        /* --- প্রগ্রেস বার --- */
        #uploadProgress { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: rgba(0,0,0,0.95); padding: 25px; border-radius: 20px; border: 1px solid #45f3ff; display: none; z-index: 5000; text-align: center; }
        .bar-bg { width: 100%; height: 12px; background: #222; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #45f3ff, #ff3c7b); transition: 0.3s; }

        /* --- গ্রিড --- */
        #gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 20px 10px 100px; }
        .media-card { border-radius: 10px; overflow: hidden; background: #161a21; aspect-ratio: 1; }
        .media-card img { width: 100%; height: 100%; object-fit: cover; }

        /* --- বাটন --- */
        .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: linear-gradient(45deg, #ff3c7b, #ffed00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; box-shadow: 0 10px 30px rgba(255, 60, 123, 0.5); z-index: 1000; border: 5px solid #0b0d11; cursor: pointer; }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="btn-logout" id="logoutBtn">Logout</button>
    </div>

    <div id="uploadProgress">
        <p id="pText" style="color: #45f3ff; font-weight: bold;">Uploading to Vault...</p>
        <div class="bar-bg"><div class="bar-fill" id="pFill"></div></div>
    </div>

    <div class="profile-card">
        <div class="avatar-ring" onclick="document.getElementById('profileInp').click()">
            <img src="https://via.placeholder.com/150" id="userPic">
            <input type="file" id="profileInp" hidden accept="image/*">
        </div>
        <div class="user-info">
            <h2 id="userName">SIYAMBOSS <i class="fas fa-pencil-alt edit-icon" onclick="updateProfileName()"></i></h2>
        </div>
    </div>

    <div id="gallery"></div>

    <div class="fab" onclick="document.getElementById('fileInp').click()">
        <i class="fas fa-plus"></i>
        <input type="file" id="fileInp" multiple hidden accept="image/*,video/*">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAEl8t2m_HZ1oNOC49lmpiiM4-XhGzWRfE",
            authDomain: "herovee.firebaseapp.com",
            databaseURL: "https://herovee-default-rtdb.firebaseio.com",
            projectId: "herovee",
            storageBucket: "herovee.firebasestorage.app",
            messagingSenderId: "700112828047",
            appId: "1:700112828047:web:988f0598b5341a29bba2fa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const TOKEN = "Ghp_g9UB5eMe7TQWVv8iUNeVAEiQvy3kfS1qrlzi";
        const USER = "SIYAMBOSS";
        const REPO = "Herovee1";

        // ১. ডাটা লোড (রিলোড দিলেও থাকবে)
        onAuthStateChanged(auth, user => {
            if (user) {
                const userRef = ref(db, 'profiles/' + user.uid);
                onValue(userRef, (snap) => {
                    const data = snap.val();
                    if(data) {
                        document.getElementById('userName').innerHTML = `${data.name} <i class="fas fa-pencil-alt edit-icon" onclick="updateProfileName()"></i>`;
                        document.getElementById('userPic').src = data.pic;
                    }
                });
                loadGallery();
            } else {
                window.location.href = "index.html";
            }
        });

        // ২. নাম ও প্রোফাইল সেভ
        window.updateProfileName = () => {
            const newName = prompt("Enter your name:");
            if(newName) set(ref(db, 'profiles/' + auth.currentUser.uid + '/name'), newName);
        };

        document.getElementById('profileInp').onchange = (e) => {
            const reader = new FileReader();
            reader.readAsDataURL(e.target.files[0]);
            reader.onload = () => {
                set(ref(db, 'profiles/' + auth.currentUser.uid + '/pic'), reader.result);
            };
        };

        // ৩. ফটো আপলোড ফিক্স ও প্রগ্রেস বার
        document.getElementById('fileInp').onchange = async (e) => {
            const files = e.target.files;
            if(!files.length) return;

            document.getElementById('uploadProgress').style.display = 'block';
            const fill = document.getElementById('pFill');

            for(let i=0; i<files.length; i++) {
                fill.style.width = `${((i+1)/files.length)*100}%`;
                document.getElementById('pText').innerText = `Uploading ${i+1}/${files.length}`;
                
                const base64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.readAsDataURL(files[i]);
                    reader.onload = () => r(reader.result.split(',')[1]);
                });

                const fileName = btoa(Date.now() + files[i].name).substring(0,12) + ".png";
                await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/vault/${fileName}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${TOKEN}` },
                    body: JSON.stringify({ message: "vault_up", content: base64 })
                });
            }
            document.getElementById('uploadProgress').style.display = 'none';
            loadGallery();
        };

        // ৪. Logout
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        async function loadGallery() {
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/vault`, {
                headers: { "Authorization": `token ${TOKEN}` }
            });
            if(res.ok) {
                const data = await res.json();
                const gallery = document.getElementById('gallery');
                gallery.innerHTML = "";
                data.reverse().forEach(file => {
                    const card = document.createElement('div');
                    card.className = "media-card";
                    card.innerHTML = `<img src="${file.download_url}">`;
                    gallery.appendChild(card);
                });
            }
        }
    </script>
</body>
</html>
