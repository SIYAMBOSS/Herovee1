<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE - Auto Link Call</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Inter:wght@400;600&display=swap');
        body { background: #000; color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; }
        .header { padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; background: #050505; }
        .container { padding: 40px 20px; }
        .card { background: #111; border-radius: 30px; padding: 30px; border: 1px solid #45f3ff44; max-width: 420px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .id-text { font-family: 'Orbitron', sans-serif; font-size: 32px; color: #45f3ff; margin: 15px 0; letter-spacing: 5px; }
        .btn { width: 100%; padding: 18px; border-radius: 50px; border: none; font-weight: 800; margin-top: 15px; cursor: pointer; text-transform: uppercase; }
        .btn-call { background: linear-gradient(90deg, #00ff44, #45f3ff); color: #000; }
        .btn-share { background: #ffee00; color: #000; margin-top: 20px; font-size: 14px; }
        #video-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; z-index: 1000; }
        .status { font-size: 12px; color: #ff3c7b; margin-top: 10px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="font-family: 'Orbitron'; color: #45f3ff; font-size: 20px;">HEROVEE</h2>
        <button onclick="auth.signOut()" style="background: none; border: none; color: #ff3c7b; font-size: 20px;"><i class="fas fa-power-off"></i></button>
    </div>

    <div class="container" id="mainUI">
        <div class="card">
            <p style="opacity: 0.6; font-size: 12px; letter-spacing: 2px;">YOUR CALLING ID</p>
            <div class="id-text" id="myID">-----</div>
            
            <p class="status" id="callStatus">Ready for Secure Call</p>

            <button class="btn btn-share" onclick="copyInviteLink()">
                <i class="fas fa-link"></i> COPY INVITE LINK
            </button>
            
            <p style="margin-top: 20px; font-size: 11px; opacity: 0.4;">OR CALL MANUALLY</p>
            <input type="number" id="targetID" style="width:100%; padding:15px; border-radius:50px; background:#000; color:#fff; border:1px solid #333; text-align:center; margin-top:10px;" placeholder="Friend's ID">
            <button class="btn btn-call" onclick="startCallManual()">START SESSION</button>
        </div>
    </div>

    <div id="video-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/@zegocloud/zego-uikit-prebuilt/zego-uikit-prebuilt.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEl8t2m_HZ1oNOC49lmpiiM4-XhGzWRfE",
            authDomain: "herovee.firebaseapp.com",
            projectId: "herovee",
            appId: "1:700112828047:web:988f0598b5341a29bba2fa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const appID = 1064412250;
        const serverSecret = "69886eaef48505340c59c2497ad0a679";

        let currentUserID = "";
        let currentUserName = "";

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUserName = user.displayName || user.email.split('@')[0];
                const userRef = db.collection("callingUsers").doc(user.uid);
                const doc = await userRef.get();
                if (!doc.exists) {
                    currentUserID = Math.floor(10000 + Math.random() * 90000).toString();
                    await userRef.set({ name: currentUserName, email: user.email, callingID: currentUserID });
                } else {
                    currentUserID = doc.data().callingID;
                }
                document.getElementById('myID').innerText = currentUserID;
                
                // অটো-জয়েন চেক: যদি ইউআরএল এ রুম আইডি থাকে
                const urlParams = new URLSearchParams(window.location.search);
                const autoRoomID = urlParams.get('room');
                if (autoRoomID) {
                    joinCall(autoRoomID);
                }
            } else { window.location.href = "index.html"; }
        });

        // ১. ইনভাইট লিঙ্ক তৈরি ও কপি করা
        function copyInviteLink() {
            const inviteLink = window.location.origin + window.location.pathname + "?room=" + currentUserID;
            navigator.clipboard.writeText(inviteLink).then(() => {
                alert("Invite Link Copied! Send it to your friend.");
            });
        }

        // ২. ম্যানুয়াল কল
        function startCallManual() {
            const targetID = document.getElementById('targetID').value;
            if (!targetID) return alert("Please enter an ID");
            const roomID = [currentUserID, targetID].sort().join("_");
            joinCall(roomID);
        }

        // ৩. মেইন কল জয়েন ফাংশন
        function joinCall(roomID) {
            document.getElementById('video-container').style.display = 'block';
            document.getElementById('mainUI').style.display = 'none';

            const kitToken = ZegoUIKitPrebuilt.generateKitTokenForTest(appID, serverSecret, roomID, currentUserID, currentUserName);
            const zp = ZegoUIKitPrebuilt.create(kitToken);

            zp.joinRoom({
                container: document.getElementById('video-container'),
                scenario: { mode: ZegoUIKitPrebuilt.Scenario.OneONoneCall },
                showScreenSharingButton: true,
                onLeaveRoom: () => { window.location.href = window.location.origin + window.location.pathname; }
            });
        }
    </script>
</body>
</html>
