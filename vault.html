<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE - Secure Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0b0d11;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 20px 0;
            color: #45f3ff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }

        #pContainer {
            display: none;
            width: 100%;
            max-width: 400px;
            background: #222;
            height: 8px;
            border-radius: 10px;
            margin: 20px auto;
            overflow: hidden;
            border: 1px solid #333;
        }
        #pBar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3c7b, #45f3ff);
            transition: 0.3s;
        }

        .upload-area {
            margin: 20px auto;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            border: 2px dashed #ff3c7b;
            border-radius: 20px;
            background: rgba(255, 60, 123, 0.03);
            cursor: pointer;
        }
        .upload-area i { font-size: 40px; color: #ff3c7b; margin-bottom: 10px; }

        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 30px;
        }

        .gallery-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: #161a21;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 60, 123, 0.9);
            color: white;
            border: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <h1>🔐 HEROVEE VAULT</h1>

    <div id="pContainer">
        <div id="pBar"></div>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInp').click()">
        <i class="fas fa-cloud-upload-alt"></i>
        <p style="font-weight: 600; font-size: 14px;">TAP TO UPLOAD PHOTOS</p>
        <input type="file" id="fileInp" accept="image/*" multiple hidden>
    </div>

    <div class="gallery" id="gallery"></div>

    <script type="module">
        // নতুন টোকেন আপডেট করা হয়েছে
        const TOKEN = "Ghp_eOT6XnJ4iSJ3asYe6ywhFVQxBnNNnM2CnZrl";
        const USER = "SIYAMBOSS";
        const REPO = "Herovee1";
        const FOLDER = "vault";

        const gallery = document.getElementById("gallery");
        const fileInp = document.getElementById("fileInp");
        const pContainer = document.getElementById("pContainer");
        const pBar = document.getElementById("pBar");

        async function loadVault() {
            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`, {
                    headers: { "Authorization": `token ${TOKEN}` }
                });

                if (res.ok) {
                    const files = await res.json();
                    gallery.innerHTML = "";
                    files.reverse().forEach(file => {
                        if (file.type === "file") {
                            createImgElement(file.download_url, file.path, file.sha);
                        }
                    });
                }
            } catch (err) { console.error("Load Error:", err); }
        }

        function createImgElement(src, path, sha) {
            const div = document.createElement("div");
            div.className = "gallery-item";
            const img = document.createElement("img");
            img.src = src;
            const del = document.createElement("button");
            del.className = "delete-btn";
            del.innerHTML = '<i class="fas fa-trash"></i>';
            del.onclick = () => deletePhoto(path, sha);
            div.appendChild(img);
            div.appendChild(del);
            gallery.appendChild(div);
        }

        fileInp.onchange = async () => {
            const files = fileInp.files;
            if (files.length === 0) return;
            pContainer.style.display = "block";
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                pBar.style.width = ((i + 1) / files.length * 100) + "%";
                const reader = new FileReader();
                reader.readAsDataURL(file);
                await new Promise(resolve => {
                    reader.onload = async () => {
                        const base64 = reader.result.split(',')[1];
                        const fileName = `${FOLDER}/${Date.now()}_${file.name.replace(/\s/g, "_")}`;
                        await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${fileName}`, {
                            method: "PUT",
                            headers: { "Authorization": `token ${TOKEN}` },
                            body: JSON.stringify({ message: "upload", content: base64 })
                        });
                        resolve();
                    };
                });
            }
            pContainer.style.display = "none";
            pBar.style.width = "0%";
            loadVault();
        };

        async function deletePhoto(path, sha) {
            if (!confirm("Delete this photo?")) return;
            await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`, {
                method: "DELETE",
                headers: { "Authorization": `token ${TOKEN}` },
                body: JSON.stringify({ message: "delete", sha: sha })
            });
            loadVault();
        }

        loadVault();
    </script>
</body>
</html>
