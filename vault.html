<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE - Private Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0b0d11; color: white; text-align: center; padding: 20px; }

        h1 { font-family: 'Orbitron', sans-serif; margin: 20px 0; color: #45f3ff; letter-spacing: 2px; }

        /* প্রগ্রেস বার */
        #pContainer { display: none; width: 100%; max-width: 400px; background: #222; height: 10px; border-radius: 10px; margin: 20px auto; overflow: hidden; border: 1px solid #333; }
        #pBar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff3c7b, #45f3ff); transition: 0.3s; }

        /* আপলোড জোন */
        .upload-area { margin: 20px auto; width: 100%; max-width: 400px; padding: 40px 20px; border: 2px dashed #ff3c7b; border-radius: 20px; background: rgba(255, 60, 123, 0.05); cursor: pointer; }
        .upload-area i { font-size: 45px; color: #ff3c7b; margin-bottom: 10px; }

        /* গ্যালারি গ্রিড */
        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 30px; }
        .gallery-item { position: relative; aspect-ratio: 1; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); background: #161a21; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* ডিলিট বাটন */
        .delete-btn { position: absolute; top: 5px; right: 5px; background: rgba(255, 60, 123, 0.9); color: white; border: none; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; }
    </style>
</head>
<body>

    <h1>🔐 HEROVEE VAULT</h1>

    <div id="pContainer">
        <div id="pBar"></div>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInp').click()">
        <i class="fas fa-shield-alt"></i>
        <p style="font-weight: 600;">TAP TO SECURE PHOTOS</p>
        <input type="file" id="fileInp" accept="image/*" multiple hidden>
    </div>

    <div class="gallery" id="gallery"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";

        // আপনার ফায়ারবেস কনফিগ (আগের মতোই)
        const firebaseConfig = {
            apiKey: "AIzaSyAEl8t2m_HZ1oNOC49lmpiiM4-XhGzWRfE",
            authDomain: "herovee.firebaseapp.com",
            projectId: "herovee",
            storageBucket: "herovee.firebasestorage.app",
            messagingSenderId: "700112828047",
            appId: "1:700112828047:web:988f0598b5341a29bba2fa"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // গিটহাব কনফিগ
        const TOKEN = "Ghp_g9UB5eMe7TQWVv8iUNeVAEiQvy3kfS1qrlzi"; // আপনার দেয়া টোকেন
        const USER = "SIYAMBOSS";
        const REPO = "Herovee1";
        const BASE_FOLDER = "vault";

        const gallery = document.getElementById("gallery");
        const fileInp = document.getElementById("fileInp");
        const pContainer = document.getElementById("pContainer");
        const pBar = document.getElementById("pBar");

        let currentUserEmail = "";

        // ১. লগইন চেক এবং ইউজার ফোল্ডার সেটআপ
        onAuthStateChanged(auth, user => {
            if (user) {
                currentUserEmail = user.email.replace(/[^a-zA-Z0-9]/g, "_");
                loadVault();
            } else {
                window.location.href = "index.html"; 
            }
        });

        // ২. ইউজারের নির্দিষ্ট ফোল্ডার থেকে ছবি লোড করা
        async function loadVault() {
            if (!currentUserEmail) return;
            const fullPath = `${BASE_FOLDER}/${currentUserEmail}`;
            
            try {
                const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${fullPath}`, {
                    headers: { "Authorization": `token ${TOKEN}` }
                });

                if (res.ok) {
                    const files = await res.json();
                    gallery.innerHTML = "";
                    files.reverse().forEach(file => {
                        if (file.type === "file") {
                            createImgElement(file.download_url, file.path, file.sha);
                        }
                    });
                } else {
                    gallery.innerHTML = "<p style='grid-column: 1/-1; opacity:0.5;'>Vault is empty</p>";
                }
            } catch (err) { console.error("Load Error:", err); }
        }

        function createImgElement(src, path, sha) {
            const div = document.createElement("div");
            div.className = "gallery-item";
            const img = document.createElement("img");
            img.src = src;
            img.loading = "lazy";
            
            const del = document.createElement("button");
            del.className = "delete-btn";
            del.innerHTML = '<i class="fas fa-trash"></i>';
            del.onclick = () => deletePhoto(path, sha);

            div.appendChild(img);
            div.appendChild(del);
            gallery.appendChild(div);
        }

        // ৩. ইমেইল ফোল্ডার অনুযায়ী আপলোড
        fileInp.onchange = async () => {
            const files = fileInp.files;
            if (files.length === 0 || !currentUserEmail) return;

            pContainer.style.display = "block";

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                pBar.style.width = ((i + 1) / files.length * 100) + "%";

                const reader = new FileReader();
                reader.readAsDataURL(file);

                await new Promise(resolve => {
                    reader.onload = async () => {
                        const base64 = reader.result.split(',')[1];
                        const fileName = `${BASE_FOLDER}/${currentUserEmail}/${Date.now()}_${file.name.replace(/\s/g, "_")}`;

                        await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${fileName}`, {
                            method: "PUT",
                            headers: { "Authorization": `token ${TOKEN}` },
                            body: JSON.stringify({ message: `vault upload by ${currentUserEmail}`, content: base64 })
                        });
                        resolve();
                    };
                });
            }

            pContainer.style.display = "none";
            pBar.style.width = "0%";
            loadVault();
        };

        // ৪. ডিলিট লজিক
        async function deletePhoto(path, sha) {
            if (!confirm("Delete this photo?")) return;
            const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${path}`, {
                method: "DELETE",
                headers: { "Authorization": `token ${TOKEN}` },
                body: JSON.stringify({ message: "delete photo", sha: sha })
            });
            if (res.ok) loadVault();
        }
    </script>
</body>
</html>
