<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEROVEE - Elite Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0d11; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- প্রোফাইল সেকশন --- */
        .profile-card { background: linear-gradient(180deg, rgba(255, 60, 123, 0.1), transparent); padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .avatar-ring { width: 110px; height: 110px; margin: 0 auto 15px; border-radius: 50%; padding: 4px; background: linear-gradient(45deg, #ff3c7b, #ffed00, #45f3ff); box-shadow: 0 0 20px rgba(255, 60, 123, 0.4); position: relative; }
        .avatar-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #0b0d11; }
        .user-info h2 { font-family: 'Orbitron', sans-serif; font-size: 18px; letter-spacing: 2px; display: inline-block; }
        
        .stats-row { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
        .stat-item span { display: block; font-size: 20px; font-weight: 800; }
        .stat-item label { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; }

        /* --- লোডিং বার --- */
        #uploadProgressContainer { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; background: rgba(0,0,0,0.9); padding: 20px; border-radius: 20px; border: 1px solid #45f3ff; display: none; z-index: 3000; text-align: center; }
        .progress-track { width: 100%; height: 10px; background: #222; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #45f3ff, #ff3c7b); transition: 0.3s; }

        /* --- গ্রিড --- */
        #gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 15px 120px; }
        .media-card { border-radius: 15px; overflow: hidden; background: #161a21; border: 1px solid rgba(255,255,255,0.05); }
        .media-card img, .media-card video { width: 100%; aspect-ratio: 1; object-fit: cover; }

        /* --- বাটন --- */
        .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; background: linear-gradient(45deg, #ff3c7b, #ffed00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: #000; box-shadow: 0 10px 30px rgba(255, 60, 123, 0.5); z-index: 1000; border: 5px solid #0b0d11; cursor: pointer; }
    </style>
</head>
<body>

    <div id="uploadProgressContainer">
        <p id="progressStatus" style="font-size: 14px; font-weight: bold; color: #45f3ff;">Uploading...</p>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="profile-card">
        <div class="avatar-ring" onclick="document.getElementById('profileInp').click()">
            <img src="https://via.placeholder.com/150" id="displayAvatar">
            <input type="file" id="profileInp" hidden accept="image/*">
        </div>
        <div class="user-info">
            <h2 id="displayName">SIYAMBOSS</h2>
            <i class="fas fa-pencil-alt" onclick="editName()" style="margin-left: 8px; font-size: 12px; opacity: 0.5; cursor: pointer;"></i>
        </div>
        <div class="stats-row">
            <div class="stat-item"><span id="photoCount">0</span><label>Photos</label></div>
            <div class="stat-item"><span id="videoCount">0</span><label>Videos</label></div>
        </div>
    </div>

    <div id="gallery"></div>

    <div class="fab" onclick="document.getElementById('fileInp').click()">
        <i class="fas fa-plus"></i>
        <input type="file" id="fileInp" multiple hidden accept="image/*,video/*">
    </div>

    <script type="module">
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";
        const TOKEN = "Ghp_g9UB5eMe7TQWVv8iUNeVAEiQvy3kfS1qrlzi";
        const USER = "SIYAMBOSS";
        const REPO_BASE = "Herovee";

        // ১. নাম এবং প্রোফাইল সেভ
        window.editName = () => {
            const n = prompt("New Name:");
            if(n) document.getElementById('displayName').innerText = n;
        };

        document.getElementById('profileInp').onchange = (e) => {
            const reader = new FileReader();
            reader.readAsDataURL(e.target.files[0]);
            reader.onload = () => document.getElementById('displayAvatar').src = reader.result;
        };

        // ২. আপলোড লজিক উইথ লোর্ডিং বার
        document.getElementById('fileInp').onchange = async (e) => {
            const files = e.target.files;
            if(!files.length) return;

            const container = document.getElementById('uploadProgressContainer');
            const fill = document.getElementById('progressFill');
            container.style.display = 'block';

            for(let i=0; i < files.length; i++) {
                const pct = ((i + 1) / files.length) * 100;
                fill.style.width = pct + "%";
                document.getElementById('progressStatus').innerText = `Uploading ${i+1}/${files.length}`;

                const base64 = await toBase64(files[i]);
                const path = `vault/${Date.now()}_${files[i].name}`;
                
                await fetch(`https://api.github.com/repos/${USER}/${REPO_BASE}1/contents/${path}`, {
                    method: "PUT",
                    headers: { "Authorization": `token ${TOKEN}` },
                    body: JSON.stringify({ message: "upload", content: base64.split(',')[1] })
                });
            }
            container.style.display = 'none';
            loadGallery();
        };

        const toBase64 = file => new Promise((res, rej) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = () => res(r.result);
        });

        async function loadGallery() {
            // রিপো থেকে ডাটা এনে গ্যালারিতে দেখানোর ফাংশন
        }
    </script>
</body>
</html>
