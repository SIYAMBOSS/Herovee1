<!DOCTYPE html>
<html>
<head>
<title>Photo Vault</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

.gallery img{
width:120px;
margin:10px;
border-radius:10px;
}
</style>

</head>

<body>

<h2>My Vault</h2>

<input type="file" id="upload">

<div class="gallery" id="gallery"></div>

<script>

const token = "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";
const repo = "SIYAMBOSS/Herovee1";

let email = localStorage.getItem("userEmail"); // login system থেকে আসবে

document.getElementById("upload").addEventListener("change", uploadImage);

function uploadImage(){

let file = document.getElementById("upload").files[0];

let reader = new FileReader();

reader.onload = async function(){

let base64 = reader.result.split(",")[1];

let path = "users/"+email+"/"+Date.now()+".png";

await fetch("https://api.github.com/repos/"+repo+"/contents/"+path,{
method:"PUT",
headers:{
"Authorization":"token "+token,
"Content-Type":"application/json"
},
body:JSON.stringify({
message:"upload photo",
content:base64
})
});

alert("Uploaded");

}

reader.readAsDataURL(file);

}

</script>

</body>
</html>
